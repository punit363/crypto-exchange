services:
  db:
    image: postgres:latest
    container_name: project-pg-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      # Updated for PostgreSQL 18+
      - pgdata:/var/lib/postgresql 

volumes:
  pgdata: